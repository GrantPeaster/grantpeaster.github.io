<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Georgia Civil</title>
  <link rel="stylesheet" href="assets/css/styles.css">

</head>

<body>

  <!-- NAVIGATION -->
  <nav>
    <div class="container">
      <img src="logo-dark-blue.png" alt="Georgia Civil Logo" height="60">
      <ul>
        <li><a href="#">Civil Engineering</a></li>
        <li><a href="#">Landscape Architecture</a></li>
        <li><a href="#">Land Surveying</a></li>
      </ul>
    </div>
  </nav>

  <!-- HERO -->
  <header class="section" style="background: var(--gc-blue); color: var(--gc-white);">
    <div class="container">
      <h1>Your Complete Project Partner</h1>
      <p>Growing, Creating, Innovating</p>
      <button class="btn-primary">Learn More</button>
    </div>
  </header>

  <!-- SERVICES -->
  <section class="section">
    <div class="container">
      <h2>Our Services</h2>

      <div class="service-category">Civil Engineering</div>
      <div class="service-category">Landscape Architecture</div>
      <div class="service-category">Land Surveying</div>
    </div>
  </section>

  <!-- CONTACT -->
  <section class="section" style="background: var(--gc-gray); color: var(--gc-white);">
    <div class="container">
      <h2>Contact Us</h2>
      <form>
        <input type="text" placeholder="Name">
        <input type="email" placeholder="Email">
        <textarea placeholder="Message"></textarea>
        <button class="btn-secondary">Send Message</button>
      </form>
    </div>
  </section>

</body>
</html>
