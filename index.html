<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Georgia Civil</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="icon" type="image/png" href="assets/img/gcifavicon (1).png">

</head>

<body class="dark-bg">


  <!-- HEADER -->
  <header class="site-header">
    <a href="index.html">
      <img src="assets/img/download.png" alt="Georgia Civil Logo" class="header-logo">
    </a>

    <nav>
      <ul>
        <li><a href="about.html">Why GCI</a></li>
        <li><a href="portfolio.html">Portfolio</a></li>
      </ul>
    </nav>
  </header>

  <!-- HERO -->
  <section class="hero">

    <div class="hero-carousel">
      <img src="assets/img/MorganMedical.JPG" class="carousel-image active" alt="">
      <img src="assets/img/Farmview.JPG" class="carousel-image" alt="">
    </div>

    <h1 class="hero-tagline-main">Built on Better Planning</h1>
    <h2 class="hero-tagline-sub">Where feasibility, optimization, and engineering work as one.</h2>
 <a href="about.html" class="cta-button">Learn More</a>
  </section>

  <!-- FOOTER -->
  <footer class="gc-footer">
    <div class="gc-footer-inner">

      <div class="gc-footer-left">
        <img src="assets/img/download.png" alt="">
        <img src="assets/img/SecondaryLogoGCI.png" alt="">
      </div>

      <div class="gc-footer-right">
        <p class="gc-footer-location">MADISON, GA</p>
        <p class="gc-footer-services">CIVIL ENGINEERING · LANDSCAPE ARCHITECTURE · LAND SURVEYING</p>
      </div>

    </div>
  </footer>

  <!-- CAROUSEL SCRIPT -->
  <script>
    const slides = document.querySelectorAll('.carousel-image');
    let index = 0;

    setInterval(() => {
      slides[index].classList.remove('active');
      index = (index + 1) % slides.length;
      slides[index].classList.add('active');
    }, 4000);
  </script>

</body>
</html>
